<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Sign Up | BroCoders</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="signup.css" />
  </head>
  <body>
    <!-- Background Video -->
    <video class="bg-video" autoplay muted loop>
      <source
        src="https://freestockfootagearchive.com/wp-content/uploads/2020/07/Free-Motion-Background-Loop-Swirl.mp4"
        type="video/mp4"
      />
      Your browser does not support the video tag.
    </video>
    <div class="video-overlay"></div>

    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">💡 <span>BroCoders</span></div>
      <div class="hamburger" id="hamburger">&#9776;</div>
      <ul class="nav-links" id="nav-links">
        <li><a href="home.html">Home</a></li>
        <li><a href="login.html">Log In</a></li>
      </ul>
    </nav>

    <!-- Signup Form -->
    <div class="form-container">
      <h1>🔐 Sign Up</h1>
      <p>Already have an account? <a href="login.html">Log in</a></p>

      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Password" />
      <input
        type="password"
        id="confirm-password"
        placeholder="Confirm Password"
      />
      <button id="signup-btn">Sign Up</button>

      <div id="status" style="margin-top: 20px"></div>
    </div>

    <!-- Footer -->
    <footer>© 2025 BroCoders. All rights reserved.</footer>

    <!-- Supabase & Script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="signup.js"></script>

    <script>
      document
        .getElementById("hamburger")
        .addEventListener("click", function () {
          document.getElementById("nav-links").classList.toggle("active");
        });
    </script>
  </body>
</html>
